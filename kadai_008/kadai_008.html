<!DOCTYPE html>
<html>

<head>
  <title>8章課題</title>
  <meta name="description" content="このページは8章の課題です。">
  <meta charset="UTF-8">
</head>

<body>
  <header>
    <h1>SAMURAIニュース</h1>
    <nav>
      <a href="https://www.sejuku.net/">ホーム</a>
      <a href="https://www.sejuku.net/">社会</a>
      <a href="https://www.sejuku.net/">経済</a>
      <a href="https://www.sejuku.net/">スポーツ</a>
      <a href="https://www.sejuku.net/">テクノロジー</a>
    </nav>
  </header>
  <main>
    <article>
      <h2>社会</h2>
      <section>
        <h3>和菓子店も「トリックオアトリート！」</h3>
        <p>
          日本でも年々人気の高まるハロウィン。<br>
          今年は大手和菓子店5社がハロウィン向けの和菓子セットを共同開発しました。
        </p>
        <audio src="ichi.mp3" controls></audio>
      </section>
      <section>
        <h3>私のおすすめ和菓子アンケートフォーム</h3>
        <form id="form">
          <lable>氏名</lable>
          <input type="text" placeholder="名前を入力してください">
          <br>
          <lable>年代</lable>
          <select>
            <option>10代以下</option>
            <option>20代</option>
            <option>30代</option>
            <option>40代以上</option>
          </select>
          <br>
          <lable>男性</lable><input type="radio" name="gender" value="male">
          <lable>女性</lable><input type="radio" name="gender" value="female">
          <lable>その他</lable><input type="radio" name="gender" value="others">
          <br>
          <lable>おすすめ和菓子の名称</lable>
          <input type="text" placeholder="例：みたらし団子">
          <br>
          <lable>おすすめする理由</lable>
          <textarea></textarea>
          <br>
          <lable>個人情報保護方針に同意する</lable>
          <input type="checkbox">
          <br>
          <input type="submit" value="送信">
          <input type="reset" value="リセット">
        </form>
      </section>
    </article>
    <article>
      <h2>テクノロジー</h2>
      <section>
        <h3>SAMURAIが新しい動画をリリース</h3>
        <p>
          SAMURAI公式のYouTubeで新しい動画がリリースされました。<br>
          動画の内容はHTML/CSSの解説です。
        </p>
      </section>
    </article>
  </main>
  <footer>
    <p>©SAMURAIニュース</p>
  </footer>
</body>

</html>
